<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Irhamztoy</title>
    <!-- Menggunakan Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Menggunakan Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #bb86fc;
            --modal-overlay: rgba(0, 0, 0, 0.9);
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Header & Animations --- */
        header {
            text-align: center;
            padding: 4rem 1rem;
            background: linear-gradient(180deg, rgba(30,30,30,0.8) 0%, rgba(18,18,18,0) 100%);
        }

        .header-content h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            min-height: 3.5rem; 
            color: var(--accent-color);
        }

        .header-content .creator {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-weight: 300;
            display: inline-block;
        }

        /* Animasi Mengetik Header */
        .typing-text {
            border-right: 3px solid var(--accent-color);
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--accent-color) }
        }

        /* Animasi Bounce */
        .bounce-anim {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- Main Container --- */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* --- Gallery Section --- */
        .section-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--accent-color);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform var(--transition-speed), box-shadow var(--transition-speed);
            cursor: pointer;
            position: relative;
            border: 1px solid #333;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(187, 134, 252, 0.2);
            border-color: var(--accent-color);
        }

        .card-img-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-title {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- Quotes & Music Section --- */
        #quotes-section {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .quote-slider {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 800px;
            justify-content: space-between;
            gap: 20px;
        }

        .quote-display {
            flex-grow: 1;
            min-height: 100px; /* Diperkecil sedikit agar fleksibel */
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #quote-text {
            font-size: 1.3rem;
            font-style: italic;
            color: #e0e0e0;
            min-height: 3.6rem; 
            transition: opacity 0.3s ease;
        }

        /* Tombol Navigasi */
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: var(--accent-color);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            z-index: 2;
        }

        .nav-btn:hover {
            background: var(--accent-color);
            color: #121212;
            transform: scale(1.1);
        }

        /* Kontrol Musik */
        .music-player-bar {
            margin-top: 2rem;
            background: rgba(0,0,0,0.3);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #333;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .play-btn {
            background: var(--accent-color);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .track-info {
            text-align: left;
            flex-grow: 1;
        }

        .track-name {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .track-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .music-visual {
            width: 30px;
            height: 30px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 2s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .music-visual.playing {
            opacity: 1;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Modal (Popup) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: var(--modal-overlay);
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            opacity: 1;
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 4% auto;
            padding: 0;
            width: 90%;
            max-width: 850px;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #333;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin: 0;
        }

        .close-btn {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
        }

        .close-btn:hover { color: #fff; }

        .modal-body {
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .modal-image-container {
            width: 100%;
            max-height: 400px;
            overflow: hidden;
            background: #000;
            border-bottom: 1px solid #333;
        }

        .modal-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Gambar akan utuh tanpa terpotong */
            display: block;
        }

        .modal-details {
            padding: 2rem;
            background: var(--card-bg);
        }

        .modal-desc {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .video-label {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 3rem;
            border-top: 1px solid #333;
        }

        @media (max-width: 768px) {
            .quote-slider { gap: 10px; }
            .nav-btn { width: 40px; height: 40px; font-size: 1rem; }
            #quote-text { font-size: 1.1rem; }
            .music-player-bar { flex-direction: column; gap: 10px; border-radius: 16px; }
            .modal-content { width: 95%; margin: 10% auto; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-content">
            <h1><span id="typewriter-title" class="typing-text"></span></h1>
            <div class="creator bounce-anim">
                <i class="fas fa-code"></i> Dibuat oleh <span id="creator-name" style="color:white; font-weight:600;">Irhamztoy</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Gallery Section -->
        <section id="gallery">
            <h2 class="section-title">Koleksi Visual</h2>
            <div class="gallery-grid" id="gallery-container">
                <!-- Gallery items injected via JS -->
            </div>
        </section>

        <!-- Quotes & Music Section -->
        <section id="quotes-section">
            <div class="quote-slider">
                <button class="nav-btn" id="prev-btn" aria-label="Quotes Sebelumnya">
                    <i class="fas fa-chevron-left"></i>
                </button>
                
                <div class="quote-display">
                    <p id="quote-text">Loading quotes...</p>
                </div>
                
                <button class="nav-btn" id="next-btn" aria-label="Quotes Selanjutnya">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <!-- Pemutar Musik Terpisah -->
            <div class="music-player-bar">
                <button class="play-btn" id="play-pause-btn">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
                <div class="music-visual" id="visualizer"></div>
                <div class="track-info">
                    <span class="track-name" id="track-name">Latar Belakang Musik</span>
                    <span class="track-status" id="track-status">Klik Play untuk Memutar</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Irhamztoy All right reserved</p>
    </footer>

    <!-- Modal (Popup) -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Judul Gambar</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modal-img" src="" alt="Detail Image">
                </div>
                <div class="modal-details">
                    <p class="modal-desc" id="modal-desc">Deskripsi gambar akan muncul di sini.</p>
                    <span class="video-label"><i class="fas fa-play-circle"></i> Video Terkait:</span>
                    <div class="video-wrapper">
                        <iframe id="modal-video" src="" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Audio Element -->
    <audio id="bg-music" loop></audio>

    <script>
        // --- 1. Data Konfigurasi (DIPERBAIKI) ---
        
        // PENTING: Saya mengganti path gambar lokal dengan gambar online agar tampil terlihat.
        // Jika ingin menggunakan gambar lokal Anda sendiri, ganti 'img' URL kembali menjadi "pic/1.png", dst.
        const galleryData = [
            {
                id: 1,
                title: "Komorebi Kiddo",
                desc: "Salah satu channel pemuda indonesia yang tinggal di jepang.",
                img: "pic/1.png", 
                video: "https://www.youtube.com/embed/7kO5q0QE15c?si=m0feB4JhlfaMmHFi" 
            },
            {
                id: 2,
                title: "Pieter patonedi",
                desc: "Salah satu chanel orang Indonesia yang tinggal di Jerman.",
                img: "pic/2.png", 
                video: "https://www.youtube.com/embed/GgFYhFUGTBw?si=RG1LSA6HTGHVjR7X" 
            },
            {
                id: 3,
                title: "Chakurin Fuufu",
                desc: "Salah satu chanel orang indonesia yang tinggal di Jepang",
                img: "pic/3.png", 
                video: "https://www.youtube.com/embed/b3vW2JMNNWM?si=1kLQvTZJAefR3Dum" 
            },
            {
                // Menambahkan item ke-4 agar grid terlihat seimbang (dan menutup syntax error)
                id: 4,
                title: "Angelina Christy",
                desc: "Salah satu obat penyemangat gw.",
                img: "pic/4.png", 
                video: "https://www.youtube.com/embed/19CGIbIBFcQ?si=B4ZFGpxA6EduBGkm" 
            }
        ];

        // Data Quotes + Musik
        // PENTING: Saya menggunakan link audio online sampel agar musik bisa terdengar.
        // Untuk menggunakan file lokal Anda, ganti 'audio' URL kembali menjadi "lagu/1.mp3", dst.
        const quotesData = [
            {
                text: "Doa yang kamu langitkan tidak akan pulang dengan tangan kosong.",
                // Ganti URL ini dengan: "lagu/1.mp3"
                audio: "lagu/1.mp3", 
                title: "Yakinlah"
            },
            {
                text: "Jangan pernah bunuh mimpilu, karena sekeras apapun lu pukul dan lu kubur, dia cuman akan pingsan dan bangkit diusia lu tua dalam bentuk penyesalan.",
                // Ganti URL ini dengan: "lagu/3.mp3"
                audio: "lagu/3.mp3", 
                title: "Berusahalah"
            },
            {
                text: "Ketika kamu punya kesempatan untuk kerja ke luar negeri, pergilah! Karena masa muda tidak datang dua kali. Nekat atau tidak sama sekali.",
                // Ganti URL ini dengan: "lagu/2.mp3"
                audio: "lagu/2.mp3", 
                title: "Bangkitlah"
            }
        ];

        // --- 2. Render Galeri ---
        const galleryContainer = document.getElementById('gallery-container');
        galleryData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openModal(item);
            card.innerHTML = `
                <div class="card-img-wrapper">
                    <img src="${item.img}" alt="${item.title}" loading="lazy">
                </div>
                <div class="card-content">
                    <h3 class="card-title">${item.title}</h3>
                    <p class="card-desc">${item.desc}</p>
                </div>
            `;
            galleryContainer.appendChild(card);
        });

        // --- 3. Modal Logic ---
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modal-img');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalVideo = document.getElementById('modal-video');
        const closeModalBtn = document.getElementById('close-modal');

        function openModal(item) {
            modalTitle.innerText = item.title;
            modalDesc.innerText = item.desc;
            modalImg.src = item.img;
            // Menambahkan autoplay=1 agar video langsung berjalan saat modal dibuka
            const videoSrc = item.video.includes('?') ? item.video + '&autoplay=1' : item.video + '?autoplay=1';
            modalVideo.src = videoSrc; 

            modal.style.display = "block";
            // Sedikit delay untuk transisi CSS opacity
            setTimeout(() => modal.classList.add('show'), 10);
            document.body.style.overflow = 'hidden';
            
            // Pause musik background agar tidak berbenturan dengan video
            if (!bgMusic.paused) {
                bgMusic.pause();
                // Kita simpan state agar nanti user tidak bingung tombol play nya
                wasPlayingBeforeModal = true;
            } else {
                wasPlayingBeforeModal = false;
            }
        }

        let wasPlayingBeforeModal = false;

        function closeModal() {
            modal.classList.remove('show');
            setTimeout(() => {
                // Reset src video untuk menghentikan suara
                modalVideo.src = ""; 
                modal.style.display = "none";
                document.body.style.overflow = 'auto';
                
                // Lanjutkan musik background jika sebelumnya sedang main
                if (wasPlayingBeforeModal) {
                    bgMusic.play().then(() => {
                        isPlaying = true;
                        updateMusicUI();
                    }).catch(e => console.log(e));
                    wasPlayingBeforeModal = false;
                }
            }, 300); // Sesuaikan dengan durasi transition CSS
        }

        closeModalBtn.onclick = closeModal;
        window.onclick = function(event) { if (event.target == modal) closeModal(); };

        // --- 4. Header Animasi ---
        const titleElement = document.getElementById('typewriter-title');
        const mainTitle = "Galeri Mimpi";
        let titleIndex = 0;
        function typeWriter() {
            if (titleIndex < mainTitle.length) {
                titleElement.innerHTML += mainTitle.charAt(titleIndex);
                titleIndex++;
                setTimeout(typeWriter, 100);
            } else {
                // Hapus kursor blink setelah selesai mengetik judul
                titleElement.style.borderRight = "none";
            }
        }
        window.onload = () => {
            typeWriter();
            loadQuote(0); // Load quotes pertama saat start
        };

        // --- 5. Quotes & Music Logic ---
        let currentQuoteIndex = 0;
        let isPlaying = false;
        const bgMusic = document.getElementById('bg-music');
        
        // UI Elements
        const quoteText = document.getElementById('quote-text');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const visualizer = document.getElementById('visualizer');
        const trackName = document.getElementById('track-name');
        const trackStatus = document.getElementById('track-status');

        // Fungsi Animasi Mengetik Quotes
        let typeInterval;
        function typeQuote(text) {
            quoteText.style.opacity = 0; // Fade out sebentar
            
            setTimeout(() => {
                quoteText.innerHTML = "";
                let i = 0;
                clearInterval(typeInterval); 
                
                // Tampilkan kursor sementara
                quoteText.style.borderRight = "3px solid var(--accent-color)";
                quoteText.style.opacity = 1; // Fade in
                
                typeInterval = setInterval(() => {
                    if (i < text.length) {
                        quoteText.innerHTML += text.charAt(i);
                        i++;
                    } else {
                        clearInterval(typeInterval);
                        quoteText.style.borderRight = "none"; 
                    }
                }, 30); // Kecepatan mengetik (ms)
            }, 300);
        }

        // Fungsi Load Quote & Audio Baru
        function loadQuote(index) {
            // Boundary check (Looping)
            if (index >= quotesData.length) currentQuoteIndex = 0;
            else if (index < 0) currentQuoteIndex = quotesData.length - 1;
            else currentQuoteIndex = index;

            const data = quotesData[currentQuoteIndex];

            // 1. Update Teks
            typeQuote(data.text);

            // 2. Update Audio Source
            const wasPlaying = !bgMusic.paused; 
            
            bgMusic.src = data.audio; 
            trackName.innerText = `Saran: ${data.title}`;
            
            // Jika sebelumnya sedang main, lanjutkan mainkan lagu baru
            if (wasPlaying) {
                bgMusic.play().catch(e => console.log("Autoplay blocked", e));
            }
        }

        // Event Listeners Navigasi
        nextBtn.addEventListener('click', () => loadQuote(currentQuoteIndex + 1));
        prevBtn.addEventListener('click', () => loadQuote(currentQuoteIndex - 1));

        // Event Listener Play/Pause
        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    isPlaying = true;
                    updateMusicUI();
                }).catch(err => {
                    console.log("Perlu interaksi user untuk play audio pertama kali");
                    alert("Klik di mana saja untuk memulai audio browser");
                });
            } else {
                bgMusic.pause();
                isPlaying = false;
                updateMusicUI();
            }
        }

        function updateMusicUI() {
            if (!bgMusic.paused) {
                playIcon.className = "fas fa-pause";
                visualizer.classList.add('playing');
                trackStatus.innerText = "Sedang Memutar...";
            } else {
                playIcon.className = "fas fa-play";
                visualizer.classList.remove('playing');
                trackStatus.innerText = "Dijeda - Klik Play";
            }
        }

        playPauseBtn.addEventListener('click', toggleMusic);

        // Sinkronisasi UI jika audio berhenti karena selesai
        bgMusic.onended = () => {
            isPlaying = false;
            updateMusicUI();
        };

        // Error handling untuk audio jika file tidak ditemukan (opsional)
        bgMusic.onerror = () => {
            trackStatus.innerText = "Error: File audio tidak ditemukan";
            isPlaying = false;
            updateMusicUI();
        };

    </script>
</body>
</html>
